name: Scrape phone prices

on:
  schedule:
    # Times in UTC. IST = UTC+5:30.
    - cron: "30 0 * * *"   # 06:00 IST
    - cron: "30 9 * * *"   # 15:00 IST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Optional Sentry error logging — inherited by every step. No-op if the
    # SENTRY_DSN secret isn't set.
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      # Each scraper runs independently: `if: ${{ !cancelled() }}` lets the
      # remaining stores (and normalize) still run if one scraper fails, instead
      # of the first failure skipping everything after it. The job still reports
      # failure (Sentry/visibility intact) when any step errors.
      - name: Run ControlZ scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python controlz.py

      - name: Run Cashify scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python cashify.py

      - name: Run Refit scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python refit.py

      - name: Run Xtracover scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python xtracover.py

      - name: Run Ovantica scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ovantica.py

      - name: Run Mobilegoo scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python mobilegoo.py

      - name: Run Sahivalue scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sahivalue.py

      - name: Run OldSold scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python oldsold.py

      - name: Run ThePhoneHub scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python thephonehub.py

      - name: Run EasyPhones scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python easyphones.py

      - name: Run Tetro scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python tetro.py

      - name: Run Grest scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python grest.py

      - name: Run CellBuddy scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python cellbuddy.py

      - name: Run Budli scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python budli.py

      - name: Run iTradeit scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python itradeit.py

      - name: Run Gadget Rebirth scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python gadgetrebirth.py

      - name: Run Maple Store scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python maplestore.py

      - name: Run Samsung Certified Re-Newed scraper
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python samsungcr.py

      - name: Normalize (clean names + recompute keys)
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python normalize_db.py

      - name: Send price-drop notifications
        if: ${{ !cancelled() }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: python notify.py