name: Remove image backgrounds

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "sample = process a few for review; all = process every image"
        type: choice
        default: sample
        options: [sample, all]
      sample_size:
        description: "How many images when mode=sample"
        default: "12"
      method:
        description: "combo = remove only where ML AND flood agree (default); flood / rembg alone"
        type: choice
        default: combo
        options: [combo, flood, rembg]
      flood_tol:
        description: "Flood colour tolerance vs background (combo default 72, flood 32)"
        default: "72"
      model:
        description: "rembg model (only when method=rembg)"
        type: choice
        default: isnet-general-use
        options: [isnet-general-use, u2netp, u2net, birefnet-general-lite]
      alpha_gain:
        description: "Multiply alpha so soft subject goes opaque (1 = raw; 3 default)"
        default: "3"
      overwrite:
        description: "Reprocess images already in nobg/ (for re-sampling tweaks)"
        type: boolean
        default: false

jobs:
  removebg:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      METHOD: ${{ inputs.method }}
      FLOOD_TOL: ${{ inputs.flood_tol }}
      REMBG_MODEL: ${{ inputs.model }}
      ALPHA_GAIN: ${{ inputs.alpha_gain }}
      MAX_DIM: "1024"
      INSPECT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install rembg[cpu] pillow onnxruntime boto3 scipy numpy
      - name: Run background removal
        run: |
          OW=""
          [ "${{ inputs.overwrite }}" = "true" ] && OW="--overwrite"
          if [ "${{ inputs.mode }}" = "all" ]; then
            python3 removebg.py --all $OW
          else
            python3 removebg.py --sample ${{ inputs.sample_size }} $OW
          fi
