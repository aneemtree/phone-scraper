name: Enrich specs (GSMArena)

# Incremental specs + canonical-image enrichment. Only processes variant_keys that
# are in `phones` but missing from `specs` (a match — or a recorded not_found — is
# never re-fetched), so most runs are cheap or no-ops. Separate from the scrape so a
# block/slowdown never affects pricing.
#
# NOTE: GSMArena may rate-limit or block GitHub Actions' datacenter IPs (Cloudflare).
# If runs come back mostly not_found / errored, run it locally instead:
#   python3 gsmarena.py
on:
  schedule:
    - cron: "0 4 * * 0"   # weekly, Sundays 04:00 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Max variant_keys to process (blank = all missing)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run GSMArena enrichment
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python gsmarena.py --limit ${{ inputs.limit }}
          else
            python gsmarena.py
          fi
