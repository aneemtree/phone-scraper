name: News blog

on:
  schedule:
    # Every 6 hours (UTC). Best-effort; GitHub cron can run late. Most runs are
    # no-ops (no new alerts); a Claude call only fires when a new story clusters.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "normal = write new posts; backfill-images = fill images on existing posts; backfill-orphans = regenerate posts for source articles that have none"
        type: choice
        default: normal
        options: [normal, backfill-images, backfill-orphans]

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install requests supabase python-dotenv sentry-sdk boto3 anthropic trafilatura
      - run: python3 news.py ${{ inputs.mode == 'backfill-images' && '--backfill-images' || (inputs.mode == 'backfill-orphans' && '--backfill-orphans' || '') }}
