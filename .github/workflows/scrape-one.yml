name: Scrape single site

# Manual-only: pick one scraper to run on its own (handy for testing a fix
# without re-running the whole catalog).
on:
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which scraper to run"
        required: true
        default: "ovantica"
        type: choice
        options:
          - cashify
          - controlz
          - refit
          - xtracover
          - ovantica
          - mobilegoo
          - sahivalue
          - oldsold
          - thephonehub
          - easyphones
          - tetro

permissions:
  contents: read

jobs:
  scrape-one:
    runs-on: ubuntu-latest
    # Optional Sentry error logging — inherited by every step. No-op if the
    # SENTRY_DSN secret isn't set.
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run ${{ inputs.scraper }} scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ${{ inputs.scraper }}.py
