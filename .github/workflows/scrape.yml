name: Scrape phone prices

on:
  schedule:
    # Times in UTC. IST = UTC+5:30.
    - cron: "30 0 * * *"   # 06:00 IST
    - cron: "30 9 * * *"   # 15:00 IST
  workflow_dispatch:

permissions:
  contents: read

# Shared with every job. Secrets are allowed in workflow-level env.
env:
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET }}
  R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

jobs:
  # Requests-only scrapers — no browser, so no Playwright install (fast).
  requests-scrapers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # `if: ${{ !cancelled() }}` so one scraper failing doesn't skip the rest.
      - name: Refit
        if: ${{ !cancelled() }}
        run: python refit.py
      - name: Mobilegoo
        if: ${{ !cancelled() }}
        run: python mobilegoo.py
      - name: Sahivalue
        if: ${{ !cancelled() }}
        run: python sahivalue.py
      - name: OldSold
        if: ${{ !cancelled() }}
        run: python oldsold.py
      - name: ThePhoneHub
        if: ${{ !cancelled() }}
        run: python thephonehub.py
      - name: EasyPhones
        if: ${{ !cancelled() }}
        run: python easyphones.py
      - name: Tetro
        if: ${{ !cancelled() }}
        run: python tetro.py
      - name: Grest
        if: ${{ !cancelled() }}
        run: python grest.py
      - name: CellBuddy
        if: ${{ !cancelled() }}
        run: python cellbuddy.py
      - name: Budli
        if: ${{ !cancelled() }}
        run: python budli.py
      - name: iTradeit
        if: ${{ !cancelled() }}
        run: python itradeit.py
      - name: Gadget Rebirth
        if: ${{ !cancelled() }}
        run: python gadgetrebirth.py
      - name: Maple Store
        if: ${{ !cancelled() }}
        run: python maplestore.py

  # Playwright scrapers — install the browser (cached) only here.
  browser-scrapers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - run: python -m playwright install --with-deps chromium
      - name: ControlZ
        if: ${{ !cancelled() }}
        run: python controlz.py
      - name: Cashify
        if: ${{ !cancelled() }}
        run: python cashify.py
      - name: Xtracover
        if: ${{ !cancelled() }}
        run: python xtracover.py
      - name: Ovantica
        if: ${{ !cancelled() }}
        run: python ovantica.py

  # Runs after BOTH scraper jobs; `if: !cancelled()` so a scraper failure
  # doesn't skip the normalize pass.
  normalize:
    needs: [requests-scrapers, browser-scrapers]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Normalize (clean names + recompute keys)
        run: python normalize_db.py
